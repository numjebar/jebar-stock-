<title>JE BAR | ใบเช็คเค้ก</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f3ee;
  --card:#fff;
  --border:#e8e5dc;
  --border2:#d5d1c5;
  --text:#1c1b18;
  --muted:#7a786f;
  --hint:#b5b2a8;
  --gold:#a07c28;
  --gold2:#b8943a;
  --gold-bg:#fdf5e0;
  --gold-border:#e8d090;
  --green:#2d5e10;
  --green-bg:#ebf4dc;
  --green-border:#a8d870;
  --blue:#1350a0;
  --blue-bg:#e3ecfa;
  --blue-border:#a0c0f0;
  --red:#8a2424;
  --red-bg:#faeaea;
  --red-border:#f0b8b8;
  --pastel-row:#fdfaf4;
  --pastel-alt:#f7f4ee;
  --hdr-bg:#ffffff;
  --hdr-border:#e8e5dc;
  --r:12px;--rs:8px;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
.page{max-width:600px;margin:0 auto;padding-bottom:48px}

/* ── HEADER ── */
.hdr{
  background:var(--hdr-bg);
  border-bottom:1px solid var(--hdr-border);
  position:sticky;top:0;z-index:50;
  padding:env(safe-area-inset-top,0) 0 0;
}
.hdr-inner{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  padding:10px 16px 10px;
  gap:10px;
}
.logo-area img{height:52px;width:auto;object-fit:contain;display:block}
.hdr-title{text-align:center}
.hdr-title span{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.3px;display:block;line-height:1.2}
.hdr-title small{font-size:10px;color:var(--gold2);letter-spacing:.7px;font-weight:600}
.hdr-actions{display:flex;justify-content:flex-end;gap:8px}

/* ── ICON BUTTONS ── */
.ico-btn{
  width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border2);
  background:var(--bg);
  color:var(--text);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;
  -webkit-appearance:none;transition:background .15s;
}
.ico-btn:active{background:var(--border)}

/* ── CONTENT ── */
.content{padding:14px 14px 0}

/* ── DAY TABS ── */
.day-bar{display:none!important;display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:12px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.day-bar::-webkit-scrollbar{display:none}
.day-tab{padding:6px 15px;border-radius:20px;border:1px solid var(--border2);background:var(--card);font-size:12px;cursor:pointer;color:var(--muted);white-space:nowrap;font-family:'Sarabun',sans-serif;font-weight:500;flex-shrink:0}
.day-tab.active{background:#2d5e10;color:#fff;border-color:#2d5e10}
.day-tab.has-data{border-color:var(--green);color:var(--green)}
.day-tab.active.has-data{background:#2d5e10;color:#fff;border-color:#2d5e10}

/* ── DATE ROW ── */
.date-row{display:flex;align-items:center;gap:12px;background:#c8e8e0;border:1.5px solid #a0d4c8;border-radius:var(--r);padding:14px 18px;margin-bottom:12px}
.date-row label{font-size:13px;font-weight:700;color:#1a4a40;white-space:nowrap;letter-spacing:.3px}
.date-row input[type=date]{flex:1;font-size:18px;font-weight:700;border:none;background:transparent;color:#1a4a40;font-family:'Sarabun',sans-serif;outline:none}

/* ── TOGGLE ── */
.opts-bar{margin-bottom:10px}
.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.toggle input{display:none}
.toggle-track{width:38px;height:22px;border-radius:11px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.toggle input:checked+.toggle-track{background:#4a9080}
.toggle-track .toggle-thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.toggle input:checked+.toggle-track .toggle-thumb{transform:translateX(16px)}
.toggle-lbl{font-size:12px;color:var(--muted)}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px}
.stat-lbl{font-size:11px;color:var(--muted);margin-bottom:2px}
.stat-val{font-size:22px;font-weight:700;color:var(--text)}
.stat-val.g{color:var(--green)}
.stat-val.gd{color:var(--gold)}

/* ── TABLE ── */
.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.t-head{display:grid;grid-template-columns:26px 1fr 74px 30px;padding:8px 12px;background:#c8e8e0;border-bottom:1px solid #b0d8ce;font-size:11px;font-weight:700;color:#2a5e52;gap:6px;letter-spacing:.4px}
.t-head.wn{grid-template-columns:26px 1fr 74px 1fr 30px}
.irow{display:grid;grid-template-columns:26px 1fr 74px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);gap:6px;background:var(--pastel-row)}
.irow:nth-child(even){background:var(--pastel-alt)}

.irow:last-child{border-bottom:none}
.irow.dragging{opacity:.3}
.irow.drag-over{border-top:2px solid #4a9080}
.drag-h{color:var(--hint);font-size:17px;cursor:grab;display:flex;align-items:center;touch-action:none}
.iname{display:flex;align-items:center;gap:5px;overflow:hidden}
.iname span{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.del-btn{opacity:0;border:none;background:none;cursor:pointer;color:var(--red);padding:2px 4px;border-radius:4px;font-size:11px;flex-shrink:0}
.irow:hover .del-btn{opacity:1}
select.qty{width:68px;font-size:13px;padding:5px 3px;border:1px solid var(--border2);border-radius:var(--rs);background:#fff;color:var(--text);font-family:'Sarabun',sans-serif;text-align:center;-webkit-appearance:none;cursor:pointer;outline:none}
select.qty.filled{background:var(--green-bg);border-color:var(--green-border);color:var(--green);font-weight:600}
select.qty:focus{border-color:#4a9080}
.note-in{width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text);font-family:'Sarabun',sans-serif;outline:none}
.note-in:focus{border-color:#4a9080;background:#fff}
.note-in::placeholder{color:var(--hint)}

/* ── ACTION BUTTONS ── */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.act-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:14px 10px;
  border-radius:var(--r);border:1.5px solid transparent;
  font-family:'Sarabun',sans-serif;cursor:pointer;
  transition:opacity .15s,transform .1s;-webkit-appearance:none;text-align:center;
}
.act-btn:active{opacity:.8;transform:scale(.97)}
.act-btn .ico{font-size:22px;line-height:1}
.act-btn .lbl{font-size:13px;font-weight:600;line-height:1.2}
.act-btn .sub{font-size:10px;font-weight:400;opacity:.75;line-height:1.2}
.act-btn.save{
  background:#c8e8e0;color:#1a4a40;border-color:#a8d8d0;
  grid-column:span 2;flex-direction:row;gap:10px;padding:15px 20px;
}
.act-btn.save .lbl{font-size:15px}
.act-btn.save .sub{font-size:11px;color:#2d7060;font-weight:500}
.act-btn.save .ico{font-size:24px}
.act-btn.add-new{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-border)}
.act-btn.clear{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.act-btn.export{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}

/* ── ADD FORM ── */
.add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.add-form h3{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px}
.add-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.add-row input[type=text]{flex:1;min-width:140px;font-size:14px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;outline:none}
.add-row input:focus{border-color:#4a9080;background:#fff}
.sm-btn{padding:8px 14px;border-radius:var(--rs);border:none;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.sm-btn.ok{background:var(--green);color:#fff}
.sm-btn.cancel{background:var(--border);color:var(--muted)}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a4a40;color:#a8e8d8;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;border:1px solid rgba(80,180,150,.4);opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.swipe-wrap{position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.swipe-wrap:last-child{border-bottom:none}
.swipe-wrap.drag-over{border-top:2px solid #b8943a}
.swipe-del{position:absolute;right:0;top:0;bottom:0;width:80px;background:#c0392b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer;border-radius:0 var(--rs) var(--rs) 0}
.swipe-content{display:grid;grid-template-columns:26px 1fr 74px;align-items:center;padding:8px 12px;gap:6px;background:var(--pastel-row);transition:transform .2s;will-change:transform;position:relative;z-index:1}
.swipe-content.wn{grid-template-columns:26px 1fr 74px 1fr}
.swipe-wrap:nth-child(even) .swipe-content{background:var(--pastel-alt)}
</style>
</head>

<script>
function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}
const DEF=['ปังไส้หมูหยอง','ปังไส้หมูหยอง ลูกเกด','ปังไส้ฝอยทอง','ชิโอะ กรอบ','ชิโอะ นุ่ม','คอนเฟลก กระป๋อง','คอนเฟลก แพค','คุ้กกี้ 1กิโล XL','คุ้กกี้ ครึ่งกิโล L','คุ้กกี้ 250กรัม M','คุ้กกี้ 150กรัม S','คุ้กกี้เนยสด','คุ้กกี้งา','คุ้กกี้ธัญพืช','คุ้กกี้คอนเฟลก','คุ้กกี้กระเทียมชีส','กลีบลำดวล','คุ้กกี้ไอซิ่ง กล่อง','คุ้กกี้ไอซิ่ง ชิ้น','โทส','คาลาเมลพุดดิ้ง','เค้กกล้วยหอม','โรล moten','เค้กส้ม','บลูเบอรี่เค้ก','สตรอเบอรี่เค้ก','เรดเวลเวด','โมจิ','โคคมะปัง','ปังแคนเบอรี่ครีมชีส','บานอฟฟี่พาย','ช้อคบอล','ไร้เทียมทาน','เกี๊ยว'];
const KEY='jebar_v4';
let store={items:[...DEF],days:{}};
let day=todayStr(),dragIdx=null;
function todayStr(){const d=new Date();return`${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;}
function p(n){return String(n).padStart(2,'0');}
function thD(s){if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${+y+543}`;}
function load(){try{const r=localStorage.getItem(KEY);if(r)store=JSON.parse(r);}catch(e){}if(!store.items?.length)store.items=[...DEF];if(!store.days)store.days={};}
function save(){try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){}}
function dd(){if(!store.days[day])store.days[day]={qty:{},notes:{}};return store.days[day];}
function opts(c){let o='<option value="">-</option>';for(let i=1;i<=20;i++)o+=`<option value="${i}"${c==i?' selected':''}>${i}</option>`;return o;}
function renderTable(){
  const sn=document.getElementById('show-note').checked;
  const h=document.getElementById('t-head');const b=document.getElementById('list-body');
  h.className='t-head'+(sn?' wn':'');
  h.innerHTML=sn?'<span></span><span>รายการ</span><span style="text-align:center">จำนวน</span><span>หมายเหตุ</span>':'<span></span><span>รายการ</span><span style="text-align:center">จำนวน</span>';
  const d=dd();b.innerHTML='';
  store.items.forEach((name,i)=>{
    const q=d.qty[name]||'',n=d.notes[name]||'';
    const nc=sn?`<input class="note-in" type="text" placeholder="หมายเหตุ..." value="${n.replace(/"/g,'&quot;')}" data-name="${name.replace(/"/g,'&quot;')}" oninput="onNote(this)">`:'';
    const wrap=document.createElement('div');
    wrap.className='swipe-wrap';
    wrap.innerHTML=`
      <div class="swipe-del" onclick="del(${i})">ลบ</div>
      <div class="swipe-content${sn?' wn':''}" data-idx="${i}">
        <span class="drag-h" data-idx="${i}">&#8942;&#8942;</span>
        <span class="iname"><span>${name}</span></span>
        <div style="display:flex;justify-content:center"><select class="qty${q?' filled':''}" data-name="${name.replace(/"/g,'&quot;')}" onchange="onQty(this)">${opts(q)}</select></div>
        ${nc}
      </div>`;
    const sc=wrap.querySelector('.swipe-content');
    let tx0=0;
    sc.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
    sc.addEventListener('touchmove',e=>{
      const dx=e.touches[0].clientX-tx0;
      if(dx<-5) sc.style.transform=`translateX(${Math.max(dx,-80)}px)`;
      else if(dx>5) sc.style.transform='translateX(0)';
    },{passive:true});
    sc.addEventListener('touchend',()=>{
      const cur=parseFloat(sc.style.transform.replace(/[^-\d.]/g,'')||0);
      sc.style.transform=cur<-40?'translateX(-80px)':'translateX(0)';
    });
    b.appendChild(wrap);
  });
  // close all swipes on tap outside
  document.addEventListener('touchstart',e=>{
    if(!e.target.closest('.swipe-wrap'))
      document.querySelectorAll('.swipe-content').forEach(s=>s.style.transform='translateX(0)');
  },{passive:true});
  initDrag();
  upStats();
}
function onQty(el){const d=dd();d.qty[el.dataset.name]=el.value;el.className='qty'+(el.value?' filled':'');save();upStats();}
function onNote(el){dd().notes[el.dataset.name]=el.value;save();}
function upStats(){
  const d=dd();
  const f=Object.values(d.qty).filter(v=>v).length;
  const s=Object.values(d.qty).reduce((a,v)=>a+(+v||0),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-lbl">รายการ</div><div class="stat-val">${store.items.length}</div></div>
    <div class="stat"><div class="stat-lbl">กรอกแล้ว</div><div class="stat-val g">${f}</div></div>
    <div class="stat"><div class="stat-lbl">รวม</div><div class="stat-val gd">${s}</div></div>`;
}
function renderDayBar(){}
function onDateChange(){day=document.getElementById('date-input').value;renderTable();}
function openAdd(){document.getElementById('add-form').style.display='block';document.getElementById('new-name').focus();}
function closeAdd(){document.getElementById('add-form').style.display='none';document.getElementById('new-name').value='';}
function doAdd(){
  const name=document.getElementById('new-name').value.trim();
  if(!name)return;
  if(store.items.includes(name)){toast('มีรายการนี้แล้ว');return;}
  store.items.push(name);save();closeAdd();renderTable();toast('เพิ่มแล้ว ✓');
}
function del(i){
  const name=store.items[i];
  if(!confirm(`ลบ "${name}"?`))return;
  store.items.splice(i,1);
  Object.values(store.days).forEach(d=>{delete d.qty[name];delete d.notes[name];});
  save();renderTable();toast('ลบแล้ว');
}
function clearDay(){
  if(!confirm('ล้างจำนวนทั้งหมดของวันนี้?'))return;
  store.days[day]={qty:{},notes:{}};save();renderTable();toast('ล้างแล้ว ✓');
}
function exportData(){
  const blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  const[dy,dm,dd2]=day.split('-');a.download=`stock_${dd2}${dm}${dy}.json`;a.click();toast('ส่งออกแล้ว ✓');
}
function initDrag(){
  let dragIdx=null;
  document.querySelectorAll('.drag-h').forEach(handle=>{
    const row=handle.closest('.swipe-content');
    if(!row)return;
    const wrap=handle.closest('.swipe-wrap');

    // Desktop drag on whole wrap
    wrap.draggable=true;
    wrap.addEventListener('dragstart',e=>{
      dragIdx=+row.dataset.idx;
      wrap.style.opacity='.4';
      e.dataTransfer.effectAllowed='move';
    });
    wrap.addEventListener('dragend',()=>{
      wrap.style.opacity='';
      document.querySelectorAll('.swipe-wrap').forEach(w=>w.classList.remove('drag-over'));
    });
    wrap.addEventListener('dragover',e=>{
      e.preventDefault();
      document.querySelectorAll('.swipe-wrap').forEach(w=>w.classList.remove('drag-over'));
      wrap.classList.add('drag-over');
    });
    wrap.addEventListener('dragleave',()=>wrap.classList.remove('drag-over'));
    wrap.addEventListener('drop',e=>{
      e.preventDefault();wrap.classList.remove('drag-over');
      const t=+row.dataset.idx;
      if(t===dragIdx)return;
      const[m]=store.items.splice(dragIdx,1);store.items.splice(t,0,m);
      save();renderTable();
    });

    // Touch drag
    handle.style.touchAction='none';
    handle.addEventListener('touchstart',e=>{
      dragIdx=+row.dataset.idx;
      wrap.style.opacity='.4';
      e.stopPropagation();
    },{passive:true});
    handle.addEventListener('touchmove',e=>{
      e.preventDefault();
      const cy=e.touches[0].clientY;
      const wraps=[...document.querySelectorAll('.swipe-wrap')];
      wraps.forEach(w=>w.classList.remove('drag-over'));
      const target=wraps.find(w=>{
        const rect=w.getBoundingClientRect();
        return cy>=rect.top&&cy<=rect.bottom;
      });
      if(target){
        const tc=target.querySelector('.swipe-content');
        if(tc&&+tc.dataset.idx!==dragIdx)target.classList.add('drag-over');
      }
    },{passive:false});
    handle.addEventListener('touchend',()=>{
      wrap.style.opacity='';
      const over=document.querySelector('.swipe-wrap.drag-over');
      document.querySelectorAll('.swipe-wrap').forEach(w=>w.classList.remove('drag-over'));
      if(over){
        const tc=over.querySelector('.swipe-content');
        if(tc){
          const t=+tc.dataset.idx;
          if(t!==dragIdx){
            const[m]=store.items.splice(dragIdx,1);store.items.splice(t,0,m);
            save();renderTable();
          }
        }
      }
      dragIdx=null;
    });
  });
}
function saveImg(){
  const si=document.getElementById('save-icon');si.textContent='...';si.disabled=true;
  const d=dd();
  const showNote=document.getElementById('show-note').checked;
  const checker=document.getElementById('checker-name').value.trim();

  const rows=store.items.map(name=>({
    name,qty:d.qty[name]||'',note:d.notes[name]||''
  })).filter(r=>r.qty||r.note);

  if(rows.length===0){toast('ยังไม่มีข้อมูลที่จะบันทึก');si.innerHTML='&#8681;';si.disabled=false;return;}

  const gold='#b8943a';const dark='#1c1b18';const muted='#7a786f';
  const border='#e8e5dc';const green='#2d5e10';const notecol='#9a8060';

  const scale=6;
  const W=640;const padX=40;const rowH=40;
  const headerH=100;const dateH=56;const checkerH=checker?44:0;
  const tableHeadH=36;const footerH=48;
  const hasNote=showNote&&rows.some(r=>r.note);
  const colQty=80;const colNote=hasNote?160:0;
  const colName=W-padX*2-colQty-colNote;
  const H=headerH+dateH+checkerH+tableHeadH+rowH*rows.length+footerH+16;

  const cv=document.createElement('canvas');
  cv.width=W*scale;cv.height=H*scale;
  const ctx=cv.getContext('2d');
  ctx.scale(scale,scale);

  ctx.fillStyle='#fdfcf9';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#f5f3ee';ctx.fillRect(0,0,W,headerH);
  ctx.strokeStyle=border;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,headerH);ctx.lineTo(W,headerH);ctx.stroke();
  ctx.fillStyle=dark;ctx.font='bold 26px serif';ctx.textAlign='left';
  ctx.fillText('JE BAR',padX,42);
  ctx.fillStyle=gold;ctx.font='500 10px sans-serif';
  ctx.fillText('COFFEE & PASTRY',padX,60);
  ctx.fillStyle=dark;ctx.font='bold 20px sans-serif';ctx.textAlign='center';
  ctx.fillText('ใบเช็คสต๊อค',W/2,40);
  ctx.fillStyle=muted;ctx.font='11px sans-serif';
  ctx.fillText('Stock Check',W/2,58);
  ctx.strokeStyle=gold;ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(padX,headerH-8);ctx.lineTo(W-padX,headerH-8);ctx.stroke();

  const[dy2,dm2,dd3]=day.split('-');
  const dateStr=`${dd3}/${dm2}/${parseInt(dy2)+543}`;
  let curY=headerH+14;
  ctx.fillStyle=muted;ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText('วันที่',padX,curY+14);
  ctx.fillStyle=dark;ctx.font='bold 15px sans-serif';ctx.textAlign='right';
  ctx.fillText(dateStr,W-padX,curY+14);
  curY+=dateH;

  if(checker){
    ctx.strokeStyle=border;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(padX,curY-8);ctx.lineTo(W-padX,curY-8);ctx.stroke();
    ctx.fillStyle=muted;ctx.font='12px sans-serif';ctx.textAlign='left';
    ctx.fillText('ผู้เช็คสต๊อค',padX,curY+14);
    ctx.fillStyle=dark;ctx.font='bold 15px sans-serif';ctx.textAlign='right';
    ctx.fillText(checker,W-padX,curY+14);
    curY+=checkerH;
  }

  ctx.fillStyle='#1c1b18';ctx.fillRect(padX,curY,W-padX*2,tableHeadH);
  ctx.fillStyle='#c9a84c';ctx.font='bold 12px sans-serif';ctx.textAlign='left';
  ctx.fillText('รายการ',padX+12,curY+22);
  ctx.textAlign='center';ctx.fillText('จำนวน',padX+colName+colQty/2,curY+22);
  if(hasNote){ctx.textAlign='left';ctx.fillText('หมายเหตุ',padX+colName+colQty+10,curY+22);}
  curY+=tableHeadH;

  rows.forEach((r,i)=>{
    ctx.fillStyle=i%2===0?'#fdfaf4':'#f7f4ee';
    ctx.fillRect(padX,curY,W-padX*2,rowH);
    ctx.strokeStyle=border;ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(padX,curY+rowH);ctx.lineTo(W-padX,curY+rowH);ctx.stroke();
    ctx.fillStyle=dark;ctx.font='14px sans-serif';ctx.textAlign='left';
    ctx.save();ctx.beginPath();ctx.rect(padX+8,curY,colName-16,rowH);ctx.clip();
    ctx.fillText(r.name,padX+8,curY+25);ctx.restore();
    if(r.qty){
      ctx.fillStyle='#ebf4dc';
      roundRect(ctx,padX+colName+8,curY+8,colQty-16,rowH-16,6);ctx.fill();
      ctx.fillStyle=green;ctx.font='bold 14px sans-serif';ctx.textAlign='center';
      ctx.fillText(r.qty,padX+colName+colQty/2,curY+25);
    }
    if(hasNote&&r.note){
      ctx.fillStyle=notecol;ctx.font='12px sans-serif';ctx.textAlign='left';
      ctx.save();ctx.beginPath();ctx.rect(padX+colName+colQty+8,curY,colNote-10,rowH);ctx.clip();
      ctx.fillText(r.note,padX+colName+colQty+10,curY+25);ctx.restore();
    }
    curY+=rowH;
  });

  curY+=12;
  ctx.strokeStyle=border;ctx.lineWidth=0.5;
  ctx.beginPath();ctx.moveTo(padX,curY);ctx.lineTo(W-padX,curY);ctx.stroke();
  curY+=14;
  const sum=rows.reduce((a,r)=>a+(+r.qty||0),0);
  ctx.fillStyle=muted;ctx.font='12px sans-serif';ctx.textAlign='left';
  ctx.fillText(`รายการที่บันทึก ${rows.length} รายการ | รวม ${sum}`,padX,curY);
  ctx.fillStyle=gold;ctx.textAlign='right';
  ctx.fillText('JE BAR Coffee & Pastry',W-padX,curY);

  const dataURL=cv.toDataURL('image/png');

  // Show preview modal with save button
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px';

  const imgEl=document.createElement('img');
  imgEl.src=dataURL;
  imgEl.style.cssText='max-width:100%;max-height:70vh;border-radius:8px;object-fit:contain';

  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:10px;flex-wrap:wrap;justify-content:center';

  const saveBtn=document.createElement('a');
  saveBtn.href=dataURL;
  saveBtn.download=`stock_${dd3}${dm2}${dy2}.png`;
  saveBtn.style.cssText='padding:12px 24px;background:#3a6b10;color:#fff;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;font-family:Sarabun,sans-serif';
  saveBtn.textContent='⬇ ดาวน์โหลด';

  const hint=document.createElement('div');
  hint.style.cssText='color:#ccc;font-size:12px;text-align:center;font-family:Sarabun,sans-serif;line-height:1.6';
  hint.innerHTML='📱 iPhone/iPad: กดค้างที่รูป → "เพิ่มไปที่ภาพ"<br>💻 คอม: กดปุ่มดาวน์โหลด';

  const closeBtn=document.createElement('button');
  closeBtn.textContent='✕ ปิด';
  closeBtn.style.cssText='padding:10px 20px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:10px;font-size:14px;cursor:pointer;font-family:Sarabun,sans-serif';
  closeBtn.onclick=()=>document.body.removeChild(overlay);

  btnRow.appendChild(saveBtn);
  btnRow.appendChild(closeBtn);
  overlay.appendChild(imgEl);
  overlay.appendChild(hint);
  overlay.appendChild(btnRow);
  document.body.appendChild(overlay);

  toast('กดค้างที่รูปเพื่อบันทึกลงคลังภาพ');
  si.innerHTML='&#8681;';si.disabled=false;
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2200);}
