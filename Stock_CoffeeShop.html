<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f0ebe3;--card:#fff;--border:#e0d8ce;--border2:#ccc4b8;
  --text:#2d2520;--muted:#7a6f65;--hint:#b5a898;
  --br:#5c3d28;--br2:#7a5235;--br-bg:#f5ede5;--br-bd:#d4b89a;
  --warm:#c8976a;--warm-bg:#fdf0e6;--warm-bd:#e8c4a0;
  --grn:#3d6b2a;--grn-bg:#eaf3df;--grn-bd:#a0d070;
  --red:#8b3030;--red-bg:#faeaea;--red-bd:#f0b8b8;
  --p1:#fdf7f2;--p2:#f5ede5;--r:12px;--rs:8px;
}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.page{max-width:600px;margin:0 auto;padding-bottom:48px}

/* HEADER */
.hdr{background:#ffffff;border-bottom:1px solid #e0d8ce;position:sticky;top:0;z-index:50;padding:env(safe-area-inset-top,0) 0 0}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:8px 16px 8px;gap:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand-logo{height:44px;width:auto;object-fit:contain}
.brand-text{line-height:1.2}
.brand-text .name{font-size:16px;font-weight:700;color:#2d2520;letter-spacing:.5px}
.brand-text .sub{font-size:9px;color:var(--warm);letter-spacing:1px;font-weight:500}
.hdr-title{flex:1;text-align:center}
.hdr-title .t1{font-size:13px;font-weight:700;color:#2d2520;display:block}
.hdr-title .t2{font-size:9px;color:var(--warm);letter-spacing:.5px}
.hdr-btns{display:flex;gap:8px}
.ico-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border2);background:var(--br-bg);color:var(--br);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;-webkit-appearance:none}
.ico-btn:active{background:rgba(200,151,106,.25)}

.content{padding:14px 14px 0}

/* FIELDS */
.field-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:10px}
.field-row label{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600;min-width:40px}
.field-row input{flex:1;font-size:14px;border:none;background:transparent;color:var(--text);font-family:'Sarabun',sans-serif;outline:none}

/* TOGGLE */
.opts{margin-bottom:12px}
.tog{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.tog input{display:none}
.tog-track{width:38px;height:22px;border-radius:11px;background:var(--border2);position:relative;transition:background .2s;flex-shrink:0}
.tog input:checked+.tog-track{background:var(--warm)}
.tog-track .tog-thumb{width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tog input:checked+.tog-track .tog-thumb{transform:translateX(16px)}
.tog-lbl{font-size:12px;color:var(--muted)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:10px 12px}
.stat-l{font-size:11px;color:var(--muted);margin-bottom:2px}
.stat-v{font-size:22px;font-weight:700;color:var(--text)}
.stat-v.g{color:var(--grn)}
.stat-v.w{color:var(--warm)}

/* CAT TABS */
.cats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.cat{padding:11px 14px;border-radius:var(--rs);border:1.5px solid var(--border2);background:var(--card);font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);text-align:center;font-family:'Sarabun',sans-serif;transition:all .15s;-webkit-appearance:none;display:flex;align-items:center;justify-content:center;gap:7px;line-height:1}
.cat.on{background:var(--br);color:#fff;border-color:var(--br)}
.cat:active{opacity:.8}

/* TABLE */
.tcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.thead{display:grid;grid-template-columns:26px 1fr 74px;padding:9px 12px;background:var(--br);font-size:11px;font-weight:700;color:#f5dfc8;gap:6px;letter-spacing:.4px}
.thead.wn{grid-template-columns:26px 1fr 74px 1fr}

/* SWIPE ROW */
.sw{position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.sw:last-child{border-bottom:none}
.sw.drag-ov{border-top:2px solid var(--warm)}
.sw-del{position:absolute;right:0;top:0;bottom:0;width:80px;background:#c0392b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;cursor:pointer}
.sw-c{display:grid;grid-template-columns:26px 1fr 74px;align-items:center;padding:8px 12px;gap:6px;background:var(--p1);transition:transform .2s;position:relative;z-index:1}
.sw-c.wn{grid-template-columns:26px 1fr 74px 1fr}
.sw:nth-child(even) .sw-c{background:var(--p2)}
.dh{color:var(--hint);font-size:17px;cursor:grab;display:flex;align-items:center;touch-action:none}
.nm{display:flex;align-items:center;gap:5px;overflow:hidden}
.nm span{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
select.q{width:68px;font-size:13px;padding:5px 3px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--card);color:var(--text);font-family:'Sarabun',sans-serif;text-align:center;-webkit-appearance:none;cursor:pointer;outline:none}
select.q.f{background:var(--grn-bg);border-color:var(--grn-bd);color:var(--grn);font-weight:600}
.ni{width:100%;font-size:12px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:transparent;color:var(--text);font-family:'Sarabun',sans-serif;outline:none}
.ni:focus{border-color:var(--warm);background:var(--card)}
.ni::placeholder{color:var(--hint)}

/* ACTIONS */
.acts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.ab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:14px 10px;border-radius:var(--r);border:1.5px solid transparent;font-family:'Sarabun',sans-serif;cursor:pointer;-webkit-appearance:none;text-align:center}
.ab:active{opacity:.8;transform:scale(.97)}
.ab .ico{font-size:22px}
.ab .lbl{font-size:13px;font-weight:600}
.ab .sub{font-size:10px;opacity:.75}
.ab.sv{background:var(--br);color:#fff;border-color:var(--br);grid-column:span 2;flex-direction:row;gap:10px;padding:15px 20px}
.ab.sv .lbl{font-size:15px}
.ab.sv .sub{font-size:11px;color:#f5dfc8}
.ab.sv .ico{font-size:24px}
.ab.add{background:var(--warm-bg);color:var(--br2);border-color:var(--warm-bd)}
.ab.clr{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.ab.exp{background:var(--br-bg);color:var(--br);border-color:var(--br-bd)}

/* ADD FORM */
.aform{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.aform h3{font-size:13px;font-weight:600;color:var(--muted);margin-bottom:10px}
.arow{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.arow input{flex:1;min-width:140px;font-size:14px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--rs);background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;outline:none}
.arow input:focus{border-color:var(--warm);background:#fff}
.sb{padding:8px 14px;border-radius:var(--rs);border:none;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.sb.ok{background:var(--br);color:#fff}
.sb.cl{background:var(--border);color:var(--muted)}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--br);color:#f5dfc8;padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;transition:opacity .22s,transform .22s;pointer-events:none;white-space:nowrap;z-index:300}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="page">

<div class="hdr">

let day=ts(),cat='coffee',di=null;

function ts(){const d=new Date();return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate());}
function p(n){return String(n).padStart(2,'0');}
function thd(s){if(!s)return'';const[y,m,d]=s.split('-');return d+'/'+m+'/'+(+y+543);}
function ld(){try{const r=localStorage.getItem(KEY);if(r){const p=JSON.parse(r);if(p.coffee)store.coffee=p.coffee;if(p.bakery)store.bakery=p.bakery;if(p.days)store.days=p.days;}}catch(e){}}
function sv(){try{localStorage.setItem(KEY,JSON.stringify(store));}catch(e){}}
function dd(){if(!store.days[day])store.days[day]={qty:{},notes:{}};return store.days[day];}
function items(){return cat==='coffee'?store.coffee:store.bakery;}

function setCat(c){
  cat=c;
  document.getElementById('tab-coffee').className='cat'+(c==='coffee'?' on':'');
  document.getElementById('tab-bakery').className='cat'+(c==='bakery'?' on':'');
  render();
}

function mkOpts(cur){
  let o='<option value="">-</option>';
  for(let i=1;i<=50;i++){o+='<option value="'+i+'"'+(cur==i?' selected':'')+'>'+i+'</option>';}
  return o;
}

function render(){
  const sn=document.getElementById('sn').checked;
  const h=document.getElementById('th');
  const b=document.getElementById('lb');
  h.className='thead'+(sn?' wn':'');
  h.innerHTML=sn
    ?'<span></span><span>รายการ</span><span style="text-align:center">จำนวน</span><span>หมายเหตุ</span>'
    :'<span></span><span>รายการ</span><span style="text-align:center">จำนวน</span>';
  const d=dd();
  b.innerHTML='';
  items().forEach(function(name,i){
    const q=d.qty[name]||'';
    const nt=d.notes[name]||'';
    const nc=sn?('<input class="ni" type="text" placeholder="หมายเหตุ..." value="'+nt.replace(/"/g,'&quot;')+'" data-name="'+name.replace(/"/g,'&quot;')+'" oninput="onN(this)">'):'';
    const wrap=document.createElement('div');
    wrap.className='sw';
    const sel='<select class="q'+(q?' f':'')+'" data-name="'+name.replace(/"/g,'&quot;')+'" onchange="onQ(this)">'+mkOpts(q)+'</select>';
    wrap.innerHTML='<div class="sw-del" onclick="del('+i+')">ลบ</div>'
      +'<div class="sw-c'+(sn?' wn':'')+'" data-idx="'+i+'">'
      +'<span class="dh" data-idx="'+i+'">&#8942;&#8942;</span>'
      +'<span class="nm"><span>'+name+'</span></span>'
      +'<div style="display:flex;justify-content:center">'+sel+'</div>'
      +nc
      +'</div>';
    var sc=wrap.querySelector('.sw-c');
    var tx0=0;
    sc.addEventListener('touchstart',function(e){tx0=e.touches[0].clientX;},{passive:true});
    sc.addEventListener('touchmove',function(e){
      var dx=e.touches[0].clientX-tx0;
      if(dx<-5)sc.style.transform='translateX('+Math.max(dx,-80)+'px)';
      else if(dx>5)sc.style.transform='translateX(0)';
    },{passive:true});
    sc.addEventListener('touchend',function(){
      var cur=parseFloat(sc.style.transform.replace(/[^-\d.]/g,'')||0);
      sc.style.transform=cur<-40?'translateX(-80px)':'translateX(0)';
    });
    b.appendChild(wrap);
  });
  document.addEventListener('touchstart',function(e){
    if(!e.target.closest('.sw'))
      document.querySelectorAll('.sw-c').forEach(function(s){s.style.transform='translateX(0)';});
  },{passive:true});
  initDrag();
  upStats();
}

function onQ(el){const d=dd();d.qty[el.dataset.name]=el.value;el.className='q'+(el.value?' f':'');sv();upStats();}
function onN(el){dd().notes[el.dataset.name]=el.value;sv();}
function upStats(){
  const d=dd();
  const all=[...store.coffee,...store.bakery];
  const f=Object.values(d.qty).filter(function(v){return v;}).length;
  const s=Object.values(d.qty).reduce(function(a,v){return a+(+v||0);},0);
  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-l">รายการทั้งหมด</div><div class="stat-v">'+all.length+'</div></div>'
    +'<div class="stat"><div class="stat-l">กรอกแล้ว</div><div class="stat-v g">'+f+'</div></div>'
    +'<div class="stat"><div class="stat-l">รวม</div><div class="stat-v w">'+s+'</div></div>';
}

function onDC(){day=document.getElementById('di').value;render();}
function openAdd(){document.getElementById('af').style.display='block';document.getElementById('nn').focus();}
function closeAdd(){document.getElementById('af').style.display='none';document.getElementById('nn').value='';}
function doAdd(){
  var name=document.getElementById('nn').value.trim();
  if(!name)return;
  var arr=cat==='coffee'?store.coffee:store.bakery;
  if(arr.indexOf(name)>-1){toast('มีรายการนี้แล้ว');return;}
  arr.push(name);sv();closeAdd();render();toast('เพิ่มแล้ว ✓');
}
function del(i){
  var name=items()[i];
  if(!confirm('ลบ "'+name+'"?'))return;
  items().splice(i,1);
  Object.values(store.days).forEach(function(d){delete d.qty[name];delete d.notes[name];});
  sv();render();toast('ลบแล้ว');
}
function clearDay(){
  if(!confirm('ล้างจำนวนทั้งหมดของวันนี้?'))return;
  store.days[day]={qty:{},notes:{}};sv();render();toast('ล้างแล้ว ✓');
}
function expData(){
  var blob=new Blob([JSON.stringify(store,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  var pt=day.split('-');
  a.download='stock_coffee_'+pt[2]+pt[1]+pt[0]+'.json';a.click();toast('ส่งออกแล้ว ✓');
}

function initDrag(){
  document.querySelectorAll('.dh').forEach(function(handle){
    var row=handle.closest('.sw-c');if(!row)return;
    var wrap=handle.closest('.sw');
    var dragIdx=null;
    wrap.draggable=true;
    wrap.addEventListener('dragstart',function(e){dragIdx=+row.dataset.idx;wrap.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    wrap.addEventListener('dragend',function(){wrap.style.opacity='';document.querySelectorAll('.sw').forEach(function(w){w.classList.remove('drag-ov');});});
    wrap.addEventListener('dragover',function(e){e.preventDefault();document.querySelectorAll('.sw').forEach(function(w){w.classList.remove('drag-ov');});wrap.classList.add('drag-ov');});
    wrap.addEventListener('dragleave',function(){wrap.classList.remove('drag-ov');});
    wrap.addEventListener('drop',function(e){
      e.preventDefault();wrap.classList.remove('drag-ov');
      var t=+row.dataset.idx;if(t===dragIdx)return;
      var arr=items();var m=arr.splice(dragIdx,1)[0];arr.splice(t,0,m);sv();render();
    });
    handle.style.touchAction='none';
    handle.addEventListener('touchstart',function(e){dragIdx=+row.dataset.idx;wrap.style.opacity='.4';e.stopPropagation();},{passive:true});
    handle.addEventListener('touchmove',function(e){
      e.preventDefault();
      var cy=e.touches[0].clientY;
      var wraps=Array.from(document.querySelectorAll('.sw'));
      wraps.forEach(function(w){w.classList.remove('drag-ov');});
      var target=wraps.find(function(w){var r=w.getBoundingClientRect();return cy>=r.top&&cy<=r.bottom;});
      if(target){var tc=target.querySelector('.sw-c');if(tc&&+tc.dataset.idx!==dragIdx)target.classList.add('drag-ov');}
    },{passive:false});
    handle.addEventListener('touchend',function(){
      wrap.style.opacity='';
      var over=document.querySelector('.sw.drag-ov');
      document.querySelectorAll('.sw').forEach(function(w){w.classList.remove('drag-ov');});
      if(over){var tc=over.querySelector('.sw-c');if(tc){var t=+tc.dataset.idx;if(t!==dragIdx){var arr=items();var m=arr.splice(dragIdx,1)[0];arr.splice(t,0,m);sv();render();}}}
      dragIdx=null;
    });
  });
}

function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function saveImg(){
  var si=document.getElementById('si');si.textContent='...';si.disabled=true;
  var d=dd();
  var sn=document.getElementById('sn').checked;
  var checker=document.getElementById('ch').value.trim();
  var all=[...store.coffee,...store.bakery];
  var rows=all.map(function(name){return{name:name,qty:d.qty[name]||'',note:d.notes[name]||''};})
    .filter(function(r){return r.qty||r.note;});
  if(rows.length===0){toast('ยังไม่มีข้อมูลที่จะบันทึก');si.innerHTML='&#8681;';si.disabled=false;return;}
  var br='#5c3d28',dk='#2d2520',mu='#7a6f65',bd='#e0d8ce',gn='#3d6b2a',wm='#c8976a';
  var sc=6,W=640,px=40,rh=40,hH=100,dH=56,ckH=checker?44:0,tH=36,fH=48;
  var hasN=sn&&rows.some(function(r){return r.note;});
  var cq=80,cn=hasN?160:0,cname=W-px*2-cq-cn;
  var H=hH+dH+ckH+tH+rh*rows.length+fH+16;
  var cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;
  var ctx=cv.getContext('2d');ctx.scale(sc,sc);
  ctx.fillStyle='#fdf8f3';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#2d2520';ctx.fillRect(0,0,W,hH);
  ctx.fillStyle='#fff';ctx.font='bold 28px serif';ctx.textAlign='left';ctx.fillText('JE BAR',px,44);
  ctx.fillStyle=wm;ctx.font='500 10px sans-serif';ctx.fillText('COFFEE & PASTRY',px,62);
  ctx.fillStyle='#fff';ctx.font='bold 18px sans-serif';ctx.textAlign='center';ctx.fillText('Stock Coffee Shop',W/2,38);
  ctx.fillStyle=wm;ctx.font='11px sans-serif';ctx.fillText('วัตถุดิบประจำวัน',W/2,56);
  ctx.strokeStyle=wm;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(px,hH-6);ctx.lineTo(W-px,hH-6);ctx.stroke();
  var pt=day.split('-');var ds=pt[2]+'/'+pt[1]+'/'+(+pt[0]+543);
  var cy=hH+14;
  ctx.fillStyle=mu;ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('วันที่',px,cy+14);
  ctx.fillStyle=dk;ctx.font='bold 15px sans-serif';ctx.textAlign='right';ctx.fillText(ds,W-px,cy+14);cy+=dH;
  if(checker){ctx.strokeStyle=bd;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(px,cy-8);ctx.lineTo(W-px,cy-8);ctx.stroke();ctx.fillStyle=mu;ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('ผู้เช็คสต๊อค',px,cy+14);ctx.fillStyle=dk;ctx.font='bold 15px sans-serif';ctx.textAlign='right';ctx.fillText(checker,W-px,cy+14);cy+=ckH;}
  ctx.fillStyle=br;ctx.fillRect(px,cy,W-px*2,tH);
  ctx.fillStyle='#f5dfc8';ctx.font='bold 12px sans-serif';ctx.textAlign='left';ctx.fillText('รายการ',px+12,cy+22);
  ctx.textAlign='center';ctx.fillText('จำนวน',px+cname+cq/2,cy+22);
  if(hasN){ctx.textAlign='left';ctx.fillText('หมายเหตุ',px+cname+cq+10,cy+22);}cy+=tH;
  rows.forEach(function(r,i){
    ctx.fillStyle=i%2===0?'#fdf7f2':'#f5ede5';ctx.fillRect(px,cy,W-px*2,rh);
    ctx.strokeStyle=bd;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(px,cy+rh);ctx.lineTo(W-px,cy+rh);ctx.stroke();
    ctx.fillStyle=dk;ctx.font='14px sans-serif';ctx.textAlign='left';
    ctx.save();ctx.beginPath();ctx.rect(px+8,cy,cname-16,rh);ctx.clip();ctx.fillText(r.name,px+8,cy+25);ctx.restore();
    if(r.qty){rrect(ctx,px+cname+8,cy+8,cq-16,rh-16,6);ctx.fillStyle='#eaf3df';ctx.fill();ctx.fillStyle=gn;ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText(r.qty,px+cname+cq/2,cy+25);}
    if(hasN&&r.note){ctx.fillStyle=mu;ctx.font='12px sans-serif';ctx.textAlign='left';ctx.save();ctx.beginPath();ctx.rect(px+cname+cq+8,cy,cn-10,rh);ctx.clip();ctx.fillText(r.note,px+cname+cq+10,cy+25);ctx.restore();}
    cy+=rh;
  });
  cy+=12;ctx.strokeStyle=bd;ctx.lineWidth=0.5;ctx.beginPath();ctx.moveTo(px,cy);ctx.lineTo(W-px,cy);ctx.stroke();cy+=14;
  var sm=rows.reduce(function(a,r){return a+(+r.qty||0);},0);
  ctx.fillStyle=mu;ctx.font='12px sans-serif';ctx.textAlign='left';ctx.fillText('รายการที่บันทึก '+rows.length+' รายการ | รวม '+sm,px,cy);
  ctx.fillStyle=wm;ctx.textAlign='right';ctx.fillText('JE BAR Coffee & Pastry',W-px,cy);
  var dataURL=cv.toDataURL('image/png');
  var ov=document.createElement('div');ov.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px';
  var img=document.createElement('img');img.src=dataURL;img.style.cssText='max-width:100%;max-height:70vh;border-radius:8px;object-fit:contain';
  var br2=document.createElement('div');br2.style.cssText='display:flex;gap:10px;flex-wrap:wrap;justify-content:center';
  var sa=document.createElement('a');sa.href=dataURL;sa.download='stock_'+pt[2]+pt[1]+pt[0]+'.png';sa.style.cssText='padding:12px 24px;background:#5c3d28;color:#fff;border-radius:10px;font-size:15px;font-weight:600;text-decoration:none;font-family:Sarabun,sans-serif';sa.textContent='⬇ ดาวน์โหลด';
  var ht=document.createElement('div');ht.style.cssText='color:#ccc;font-size:12px;text-align:center;font-family:Sarabun,sans-serif;line-height:1.6';ht.innerHTML='📱 iPhone/iPad: กดค้างที่รูป → "เพิ่มไปที่ภาพ"<br>💻 คอม: กดปุ่มดาวน์โหลด';
  var cb=document.createElement('button');cb.textContent='✕ ปิด';cb.style.cssText='padding:10px 20px;background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:10px;font-size:14px;cursor:pointer;font-family:Sarabun,sans-serif';cb.onclick=function(){document.body.removeChild(ov);};
  br2.appendChild(sa);br2.appendChild(cb);ov.appendChild(img);ov.appendChild(ht);ov.appendChild(br2);document.body.appendChild(ov);
  toast('กดค้างที่รูปเพื่อบันทึกลงคลังภาพ');si.innerHTML='&#8681;';si.disabled=false;
}

function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}

ld();
day=ts();
document.getElementById('di').value=day;
render();
</script>
</body>
